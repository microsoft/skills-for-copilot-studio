mcs.metadata:
  componentName: <Action Name>
  description: "Description: <What this action does>"
kind: TaskDialog
inputs:
  - kind: ManualTaskInput
    propertyName: <FixedPropertyName>
    value: <Fixed Value>

  - kind: AutomaticTaskInput
    propertyName: <DynamicPropertyName>
    description: <Description for AI to understand what value to provide>
    entity: StringPrebuiltEntity
    shouldPromptUser: true

modelDisplayName: <Display name shown to AI>
modelDescription: <Description of what this action does for AI routing>
outputs:
  - propertyName: Response

action:
  kind: InvokeConnectorTaskAction
  connectionReference: <connection-reference-logical-name>
  connectionProperties:
    mode: Invoker

  operationId: <OperationId>

outputMode: All