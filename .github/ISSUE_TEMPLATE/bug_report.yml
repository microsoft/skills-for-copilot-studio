name: Bug Report
description: Report a bug or unexpected behavior (not related to wrong agent output)
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Hooks
        - Scripts
        - Evals
        - Skills
        - Setup / Installation
        - Agents (sub-agents)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: |
        Hooks are not triggering when opening VS Code on macOS.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Clone the repository
        2. Run `npm install` in the scripts folder
        3. Open VS Code and trigger the hook via ...
        4. Observe that nothing happens
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details (OS, VS Code version, Node version, Python version, etc.).
      placeholder: |
        - OS: Windows 11 / macOS 14.x / Ubuntu 22.04
        - VS Code: 1.95.x
        - Node: 20.x
        - Python: 3.12.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs, terminal output, or screenshots.
      render: markdown
    validations:
      required: false
